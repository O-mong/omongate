# Omong 커스터마이징 설정
# key=value 형식. #으로 시작하는 줄과 빈 줄은 무시됩니다.
# 값을 바꾼 뒤에는 다시 빌드해야 반영됩니다 (npm run build / npm run dev 재시작).

github_url=https://github.com/YourUserName/YourRepoName

# 배포한 실제 도메인. robots.txt/sitemap.xml을 만드는 데 쓰입니다.
# 끝에 슬래시(/) 없이 적으세요. 배포 전이라 아직 모르면 비워둬도 빌드는 됩니다
# (그 경우 sitemap.xml에 자리표시자 도메인이 들어갑니다).
site_url=https://example.com
